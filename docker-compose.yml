services:
    azurite:
        image: mcr.microsoft.com/azure-storage/azurite:latest
        container_name: azurite-feedback-platform
        command: >
            azurite
            --blobHost 0.0.0.0
            --queueHost 0.0.0.0
            --tableHost 0.0.0.0
            --location /data
            --debug /data/debug.log
            --skipApiVersionCheck
        ports:
            - "10000:10000"
            - "10001:10001"
            - "10002:10002"
        volumes:
            - azurite_data:/data

volumes:
    azurite_data:
