# application.properties de main

quarkus.azure-functions.app-name=func-feedback-platform-core
quarkus.azure-functions.runtime.java-version=25
quarkus.http.root-path=api

quarkus.azure.keyvault.secret.endpoint=${QUARKUS_AZURE_KEYVAULT_SECRET_ENDPOINT:}

quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.migrate-at-start=true

# Database
quarkus.datasource.db-kind=${FEEDBACK_DB_KIND:postgresql}
quarkus.datasource.jdbc.url=${kv//FeedbackDBUrl}
quarkus.datasource.username=${kv//FeedbackDBUser}
quarkus.datasource.password=${kv//FeedbackDBPassword}

# Email
app.email.connection-string=${kv//FeedbackEmailConnectionString}
app.admin-emails=${kv//FeedbackAdminEmailList}
app.email.sender-address=${kv//FeedbackEmailSenderAddress}
app.email.subject=${EMAIL_SUBJECT:Feedback de insatisfação recebido - FeedBack Platform}

# JWT
mp.jwt.verify.issuer=https://feedback-login.com.br/issuer
mp.jwt.verify.publickey=${kv//jwt-public-key}

quarkus.otel.metrics.enabled=true
quarkus.otel.logs.enabled=true

# Utiliza o exportador CDI da Azure (evitando o exportador OTLP local)
quarkus.otel.traces.exporter=cdi
quarkus.otel.metrics.exporter=cdi
quarkus.otel.logs.exporter=cdi

# ------------------------------------------------------------
# Perfil DEV - execução local com mvn quarkus:dev
# ------------------------------------------------------------
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:feedback_dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=sa

%dev.app.email.connection-string=endpoint=https://localhost;accesskey=mock
%dev.app.admin-emails=test@example.com
%dev.app.email.sender-address=test@example.com
%dev.app.email.subject=Feedback Dev

%dev.mp.jwt.verify.publickey=mock-key

%dev.quarkus.otel.enabled=false
%dev.quarkus.otel.sdk.disabled=true
