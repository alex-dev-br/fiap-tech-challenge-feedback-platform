quarkus.azure-functions.app-name=func-feedback-core
quarkus.azure-functions.runtime.java-version=25
quarkus.http.root-path=api

quarkus.azure.keyvault.secret.endpoint=${QUARKUS_AZURE_KEYVAULT_SECRET_ENDPOINT:}

quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.migrate-at-start=true

# Database
quarkus.datasource.db-kind=${FEEDBACK_DB_KIND:postgresql}
quarkus.datasource.jdbc.url=${FEEDBACK_DB_URL:${kv//FeedBackDBUrl:jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}}
quarkus.datasource.username=${FEEDBACK_DB_USER:${kv//FeedbackDBUser:sa}}
quarkus.datasource.password=${FEEDBACK_DB_PASSWORD:${kv//FeedBackDBPassword:sa}}

# Email
app.email.connection-string=${kv//FeedbackDBEmailConnectionString:}
app.admin-emails=${kv//FeedbackAdminEmailList:}
app.email.sender-address=${kv//FeedbackEmailSenderAddress:}
app.email.subject=${EMAIL_SUBJECT:Feedback de insatisfańŃo recebido - FeedBack Platform}

# Azure Service Bus
quarkus.azure.servicebus.connection-string=${FEEDBACK_SERVICEBUS_CONNECTION_STRING:}
quarkus.azure.servicebus.queue-name=${FEEDBACK_SERVICEBUS_QUEUE_NAME:}
quarkus.azure.servicebus.namespace=${FEEDBACK_SERVICEBUS_NAMESPACE:}
